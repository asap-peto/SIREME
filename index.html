      function getSnapshot(hospital, seed = Date.now()) {
        const bucket = Math.floor(seed / 60000);
        const wave = Math.sin((bucket + hospital.loadFactor) / 2.4) * 7;
        const pulse = Math.cos((bucket + hospital.loadFactor) / 3.2) * 4;
        const occupancyPercent = Math.max(28, Math.min(98, Math.round(hospital.occupancyPercent + wave + pulse)));
        const occupancy =
          occupancyPercent >= 90 ? 'critica' :
          occupancyPercent >= 75 ? 'alta' :
          occupancyPercent >= 55 ? 'media' : 'baixa';
        return {
          occupancyPercent,
          occupancy,
          availableBeds: Math.max(0, Math.round(hospital.totalBeds * (100 - occupancyPercent) / 100)),
          emergencyQueue: Math.max(1, Math.round(occupancyPercent / 12) + hospital.loadFactor),
          statusLabel:
            occupancy === 'critica' ? 'Fluxo tensionado' :
            occupancy === 'alta' ? 'Capacidade monitorada' :
            occupancy === 'media' ? 'Operação estável' : 'Boa disponibilidade',
        };
      }

      function classifyCase(form) {
        const text = `${form.chiefComplaint} ${form.clinicalSuspicion} ${form.observations}`.toLowerCase();
        let score = 0;
        const v = form.vitalSigns || {};
        const tags = new Set(form.triageTags || []);

        if (form.consciousnessLevel === 'inconsciente') score += 4;
        if (form.consciousnessLevel === 'soporoso') score += 3;
        if (form.consciousnessLevel === 'confuso') score += 2;
        if ((v.glasgow || 15) <= 8) score += 4;
        if ((v.saturacaoO2 || 99) < 90) score += 3;
        if ((v.pressuraSistolica || 120) < 90) score += 3;
        if ((v.frequenciaCardiaca || 80) > 130) score += 2;
        if (tags.has('choque_hipotensivo')) score += 3;
        if (tags.has('insuficiencia_respiratoria')) score += 3;
        if (tags.has('politrauma_mecanismo')) score += 3;
        if (tags.has('dor_toracica_isquemica')) score += 2;
        if (tags.has('deficit_focal_agudo')) score += 2;
        if (tags.has('sepse_provavel')) score += 2;
        if (tags.has('gestante_alto_risco')) score += 2;

        const gravity = score >= 8 ? 'critico' : score >= 5 ? 'alto' : score >= 2 ? 'moderado' : 'baixo';

        let category = 'clinico_geral';
        if (form.age < 14) category = 'pediatrico';
        else if (tags.has('gestante_alto_risco') || /gesta|eclamp|parto/.test(text)) category = 'obstetrico';
        else if (tags.has('politrauma_mecanismo') || /trauma|colis|fratura|tce/.test(text)) category = 'trauma';
        else if (tags.has('deficit_focal_agudo') || /avc|afasia|hemipleg/.test(text)) category = 'neurologico';
        else if (tags.has('dor_toracica_isquemica') || /iam|infarto|precordial|torácica/.test(text)) category = 'cardiologico';
        else if (tags.has('sepse_provavel') || /sepse|infecc|choque sépt/.test(text)) category = 'infeccioso';

        const careLine = {
          cardiologico: 'linha_cardio',
          neurologico: 'linha_neuro',
          trauma: 'linha_trauma',
          infeccioso: 'linha_infeccao',
          obstetrico: 'linha_materno_infantil',
          pediatrico: 'linha_pediatrica',
          clinico_geral: 'linha_clinica',
        }[category];

        const resourceMap = {
          cardiologico: { required: ['CARDIOLOGIA'], desired: ['HEMODINAMICA', 'UTI_ADULTO', 'TOMOGRAFIA'] },
          neurologico: { required: ['TOMOGRAFIA', 'NEUROLOGIA'], desired: ['NEUROCIRURGIA', 'UTI_ADULTO'] },
          trauma: { required: ['TRAUMA', 'BANCO_DE_SANGUE', 'TOMOGRAFIA'], desired: ['NEUROCIRURGIA', 'ORTOPEDIA', 'UTI_ADULTO'] },
          infeccioso: { required: ['BANCO_DE_SANGUE'], desired: ['UTI_ADULTO', 'DIALISE'] },
          obstetrico: { required: ['MATERNIDADE', 'BANCO_DE_SANGUE'], desired: ['UTI_NEONATAL', 'UTI_ADULTO'] },
          pediatrico: { required: ['PEDIATRIA'], desired: ['UTI_PEDIATRICA', 'BANCO_DE_SANGUE', 'TOMOGRAFIA'] },
          clinico_geral: { required: [], desired: ['UTI_ADULTO', 'TOMOGRAFIA'] },
        };

        const requiredResources = [...new Set([...(resourceMap[category].required || []), ...(form.requiredResources || [])])];
        const desiredResources = [...new Set([...(resourceMap[category].desired || []), ...(form.desiredResources || [])])]
          .filter((item) => !requiredResources.includes(item));

        if ((gravity === 'critico' || gravity === 'alto') && !requiredResources.includes('UTI_ADULTO') && category !== 'obstetrico' && category !== 'pediatrico') {
          requiredResources.push('UTI_ADULTO');
        }
        if (gravity === 'critico' && category === 'cardiologico' && !requiredResources.includes('HEMODINAMICA')) requiredResources.push('HEMODINAMICA');
        if (gravity === 'critico' && category === 'neurologico' && !requiredResources.includes('NEUROCIRURGIA')) requiredResources.push('NEUROCIRURGIA');
        if (gravity === 'critico' && category === 'trauma' && !requiredResources.includes('CIRURGIA_GERAL')) requiredResources.push('CIRURGIA_GERAL');

        const alerts = [];
        if (gravity === 'critico') alerts.push({ level: 'critical', message: 'Caso crítico. Prioridade máxima de aceite e transporte.' });
        if ((v.saturacaoO2 || 99) < 90) alerts.push({ level: 'critical', message: `SpO₂ ${v.saturacaoO2}% — risco respiratório importante.` });
        if ((v.pressuraSistolica || 120) < 90) alerts.push({ level: 'critical', message: `PA sistólica ${v.pressuraSistolica} mmHg — hipotensão grave.` });
        if (category === 'cardiologico') alerts.push({ level: 'warning', message: 'Linha cardio: considerar hemodinâmica e menor tempo de transporte.' });
        if (category === 'neurologico') alerts.push({ level: 'warning', message: 'Linha AVC: priorizar tomografia e janela terapêutica.' });
        if (category === 'obstetrico') alerts.push({ level: 'warning', message: 'Caso obstétrico: direcionar para maternidade com retaguarda neonatal.' });
        if (category === 'pediatrico') alerts.push({ level: 'warning', message: 'Caso pediátrico: evitar unidades sem pediatria/UTI pediátrica.' });

        return { gravity, category, careLine, requiredResources, desiredResources, alerts };
      }

      function haversineKm(lat1, lng1, lat2, lng2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      function runRecommendationEngine(form, classification, hospitals) {
        const excluded = [];
        const eligible = [];

        hospitals.forEach((hospital) => {
          const snapshot = getSnapshot(hospital);
          const distanceKm = haversineKm(form.originLat, form.originLng, hospital.lat, hospital.lng);
          const missing = classification.requiredResources.filter((item) => !hospital.resources.includes(item));
          const reasons = [];

          if (missing.length) reasons.push(`Recursos obrigatórios ausentes: ${missing.map((item) => RESOURCE_LABELS[item] || item).join(', ')}`);
          if (hospital.type === 'upa' && (classification.gravity === 'critico' || classification.requiredResources.includes('UTI_ADULTO') || classification.requiredResources.includes('HEMODINAMICA') || classification.requiredResources.includes('NEUROCIRURGIA'))) {
            reasons.push('UPA não é destino definitivo para caso de alta complexidade.');
          }
          if (snapshot.occupancy === 'critica' && ['critico', 'alto'].includes(classification.gravity)) {
            reasons.push(`Lotação crítica (${snapshot.occupancyPercent}%).`);
          }
          if (classification.category === 'pediatrico' && !hospital.resources.includes('PEDIATRIA') && !hospital.resources.includes('UTI_PEDIATRICA')) {
            reasons.push('Unidade sem estrutura pediátrica adequada.');
          }
          if (distanceKm > 40 && classification.gravity === 'critico') {
            reasons.push(`Distância de ${distanceKm.toFixed(1)} km considerada excessiva.`);
          }

          if (reasons.length) {
            excluded.push({ hospital, reasons });
            return;
          }

          const resourceScore = classification.requiredResources.length
            ? Math.round((classification.requiredResources.filter((item) => hospital.resources.includes(item)).length / classification.requiredResources.length) * 40)
            : 35;
          const desiredScore = classification.desiredResources.length
            ? Math.round((classification.desiredResources.filter((item) => hospital.resources.includes(item)).length / classification.desiredResources.length) * 10)
            : 6;
          const distanceScore = Math.max(0, Math.round(25 - (distanceKm / 30) * 25));
          const occupancyScore = snapshot.occupancy === 'baixa' ? 20 : snapshot.occupancy === 'media' ? 15 : snapshot.occupancy === 'alta' ? 7 : 0;
          const operational = Math.round(Math.min(10, hospital.baseScore / 10));
          const specialty = classification.category === 'cardiologico' && hospital.resources.includes('HEMODINAMICA')
            ? 15
            : classification.category === 'neurologico' && hospital.resources.includes('NEUROLOGIA')
            ? 14
            : classification.category === 'trauma' && hospital.resources.includes('TRAUMA')
            ? 15
            : classification.category === 'obstetrico' && hospital.resources.includes('MATERNIDADE')
            ? 15
            : classification.category === 'pediatrico' && hospital.resources.includes('PEDIATRIA')
            ? 15
            : 8;

          const finalScore = resourceScore + desiredScore + distanceScore + occupancyScore + operational + specialty;

          eligible.push({
            hospital,
            snapshot,
            distanceKm: Number(distanceKm.toFixed(1)),
            estimatedTimeMin: Math.round((distanceKm / (classification.gravity === 'critico' ? 70 : 55)) * 60 + 5),
            finalScore,
            confidence: 0,
            score: {
              resource: resourceScore + desiredScore,
              distance: distanceScore,
              occupancy: occupancyScore,
              specialty,
              operational,
            },
            justification: [
              `Compatível com ${classification.requiredResources.length || 0} recursos obrigatórios.`,
              `Lotação atual ${snapshot.occupancyPercent}% com ${snapshot.availableBeds} leitos livres.`,
              hospital.regulationNotes,
            ],
          });
        });

        eligible.sort((a, b) => b.finalScore - a.finalScore);
        eligible.forEach((item, index) => {
          const gap = (eligible[0]?.finalScore || item.finalScore) - (eligible[1]?.finalScore || item.finalScore - 6);
          item.rank = index + 1;
          item.confidence = index === 0 ? (gap > 12 ? 92 : gap > 6 ? 78 : 64) : Math.max(44, Math.round((item.finalScore / eligible[0].finalScore) * 75));
        });

        if (!eligible.length) {
          return {
            recommended: null,
            alternatives: [],
            excluded,
          };
        }

        return {
          recommended: eligible[0],
          alternatives: eligible.slice(1, 4),
          excluded,
        };
      }

      function TherapeuticTimer({ category, startedAt }) {
        const win = PROTOCOL_WINDOWS[category];
        const [elapsed, setElapsed] = useState(() => Math.floor((Date.now() - startedAt) / 1000));
        useEffect(() => {
          const id = setInterval(() => setElapsed(Math.floor((Date.now() - startedAt) / 1000)), 1000);
          return () => clearInterval(id);
        }, [startedAt]);
        if (!win) return null;
        const totalSec = win.totalMin * 60;
        const remaining = Math.max(0, totalSec - elapsed);
        const pct = Math.min(100, (elapsed / totalSec) * 100);
        const urgent = remaining < totalSec * 0.25 && remaining > 0;
        const expired = remaining === 0;
        const mins = Math.floor(remaining / 60);
        const secs = remaining % 60;
        const c = TIMER_COLORS[win.color] || TIMER_COLORS.rose;
        return (
          <div className={`rounded-2xl border p-4 ${expired ? 'border-red-500/40 bg-red-500/15' : c.border + ' ' + c.bg}`}>
            <div className="flex items-center justify-between mb-2">
              <p className={`text-xs font-semibold uppercase tracking-wider ${expired ? 'text-red-300' : c.text}`}>
                {expired ? '⚠ JANELA VENCIDA' : `⏱ ${win.label}`}
              </p>
              <span className={`font-display text-2xl font-bold ${expired || urgent ? 'text-red-400' : c.text}`}>
                {expired ? '00:00' : `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`}
              </span>
            </div>
            <div className="w-full bg-slate-800 rounded-full h-2 overflow-hidden">
              <div className={`h-2 rounded-full transition-all duration-500 ${expired || urgent ? 'bg-red-500' : c.bar}`} style={{ width: `${pct}%` }} />
            </div>
            <p className="mt-1.5 text-xs text-slate-500">
              {expired ? 'Janela terapêutica expirada — decisão urgente' : `${mins}min ${secs}s restantes de ${win.totalMin}min`}
            </p>
          </div>
        );
      }

            generalNotes: '',

        });

        const [newEquipImpact, setNewEquipImpact] = useState('medio');

        function refreshNotifications() {
          const fresh = getNotificationsForHospital(session.hospitalId);
          setNotifications(fresh);
          markNotificationsRead(session.hospitalId);
        }

        function update(key, val) { setStatus((s) => ({ ...s, [key]: val })); }

        function handleSave() {
          saveNirStatusToStorage({ ...status, updatedBy: session.name });
          setSaved(true);
          setTimeout(() => setSaved(false), 3000);
        }

        function addEquipment() {
          if (!newEquipName.trim()) return;
          const item = { id: `eq-${Date.now()}`, name: newEquipName.trim(), impact: newEquipImpact, since: new Date().toISOString() };
          update('brokenEquipment', [...status.brokenEquipment, item]);
          setNewEquipName('');
          setNewEquipImpact('medio');
        }

          update('brokenEquipment', status.brokenEquipment.filter((e) => e.id !== id));

        const tabs = [['ps', isUpa ? 'PS / Atendimento' : 'Pronto-Socorro'], ['leitos', isUpa ? 'Observação' : 'Leitos'], ['equipamentos', 'Equipamentos'], ['notas', 'Observações'], ['notificacoes', 'Regulação']];

                  <p className="text-xs uppercase tracking-wider text-slate-500 mb-4">Observações para a Central</p>
                  <textarea

                  />

                              <span className={`text-xs font-semibold uppercase ${gt}`}>{GRAVITY_LABELS[n.gravity] || n.gravity} · {CATEGORY_LABELS[n.category] || n.category}</span>
                            </div>
                            <span className="text-[10px] text-slate-600">{n.sentAt ? new Date(n.sentAt).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) : ''}</span>
                          </div>
                          <p className="text-sm text-white font-medium">Paciente {n.patientSex === 'M' ? 'masculino' : 'feminino'}, {n.patientAge} anos</p>
                          {n.chiefComplaint && <p className="text-xs text-slate-400 mt-1">{n.chiefComplaint}</p>}
                          <div className="mt-2 flex flex-wrap gap-1.5">
                            {(n.resources || []).map((r) => (
                              <span key={r} className="rounded-lg bg-slate-800 px-2 py-0.5 text-[10px] text-slate-300">{RESOURCE_LABELS[r] || r}</span>

              {/* Save bar */}

                <p className="text-sm text-slate-400">{status.updatedAt ? `Última atualização: ${new Date(status.updatedAt).toLocaleTimeString('pt-BR')}` : 'Nenhuma atualização enviada ainda'}</p>

                  {saved ? '✓ Salvo!' : 'Salvar atualização'}
                </button>
              </div>
            </div>
          </div>
        );
      }

      function App() {
        const [session, setSession] = useState(() => {
          try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.session) || 'null'); } catch { return null; }
        });
        const [view, setView] = useState('dashboard');
        const [cases, setCases] = useState(() => loadCases());
        const [pendingResult, setPendingResult] = useState(null);
        const [tick, setTick] = useState(Date.now());
        const [newCase, setNewCase] = useState({
          patientId: '',
          regulationCode: '',
          age: 0,
          sex: 'M',
          origin: '',
          originLat: -25.4296,
          originLng: -49.2719,
          transportType: 'USB',
          caseType: 'pre_hospitalar',
          chiefComplaint: '',
          clinicalSuspicion: '',
          vitalSigns: {},
          consciousnessLevel: 'alerta',
          triageTags: [],
          observations: '',
          requiredResources: [],
          desiredResources: [],
          freeNotes: '',
        });
        const [step, setStep] = useState(1);
        const [caseStartedAt, setCaseStartedAt] = useState(Date.now);

        useEffect(() => {
          const timer = setInterval(() => setTick(Date.now()), 20000);
          return () => clearInterval(timer);
        }, []);

        useEffect(() => {
          saveCases(cases);
        }, [cases]);

        useEffect(() => {
          if (view === 'new-case') setCaseStartedAt(Date.now());
        }, [view]);

        function handleLogin(user) {
          localStorage.setItem(STORAGE_KEYS.session, JSON.stringify(user));
          setSession(user);
        }

        function handleLogout() {
          localStorage.removeItem(STORAGE_KEYS.session);
          setSession(null);
          setView('dashboard');
          setPendingResult(null);
        }

        function updateForm(patch) {
          setNewCase((current) => ({ ...current, ...patch }));
        }

        function toggleListValue(key, value) {
          const list = newCase[key] || [];
          updateForm({ [key]: list.includes(value) ? list.filter((item) => item !== value) : [...list, value] });
        }

        function generateRecommendation(form = newCase) {
          const startedAt = Date.now();
          const classification = classifyCase(form);
          const recommendation = runRecommendationEngine(form, classification, HOSPITALS);
          const result = {
            caseId: generateCaseId(),
            timestamp: new Date().toISOString(),
            caseData: form,
            classification,
            ...recommendation,
            processingTimeMs: 320,
            timeToRecommendationMs: Date.now() - startedAt + 68000,
          };
          setPendingResult(result);
          setView('recommendation');
        }

        function saveCase(finalHospitalId, overrideReason = '') {
          if (!pendingResult) return;
          const chosen = HOSPITALS.find((item) => item.id === finalHospitalId) || pendingResult.recommended.hospital;
          const record = {
            id: pendingResult.caseId,
            savedAt: new Date().toISOString(),
            caseData: pendingResult.caseData,
            recommendation: pendingResult,
            finalHospitalId: chosen.id,
            finalHospitalName: chosen.name,
            divergedFromSuggestion: chosen.id !== pendingResult.recommended.hospital.id,
            overrideReason,
            regulatorName: session.name,
            timeline: [
              { at: new Date(Date.now() - pendingResult.timeToRecommendationMs).toISOString(), label: 'Caso criado', detail: pendingResult.caseData.origin },

              { at: pendingResult.timestamp, label: 'Recomendação', detail: pendingResult.recommended.hospital.shortName },
              { at: new Date().toISOString(), label: 'Decisão final', detail: `${chosen.shortName}${overrideReason ? ` — ${overrideReason}` : ''}` },
            ],
          };
          setCases((current) => [record, ...current].slice(0, 200));
          setPendingResult(null);
          setView('history');
          setNewCase({
            patientId: '',
            regulationCode: '',
            age: 0,
            sex: 'M',
            origin: '',
            originLat: -25.4296,
            originLng: -49.2719,
            transportType: 'USB',
            caseType: 'pre_hospitalar',
            chiefComplaint: '',
            clinicalSuspicion: '',
            vitalSigns: {},
            consciousnessLevel: 'alerta',
            triageTags: [],
            observations: '',
            requiredResources: [],
            desiredResources: [],
            freeNotes: '',
          });
          setStep(1);
        }

        const liveHospitals = useMemo(() => HOSPITALS.map((item) => ({ ...item, snapshot: getSnapshot(item, tick) })), [tick]);
        const topHospital = useMemo(() => {
          const map = {};
          cases.forEach((item) => {
            map[item.recommendation.recommended.hospital.shortName] = (map[item.recommendation.recommended.hospital.shortName] || 0) + 1;

          return Object.entries(map).sort((a, b) => b[1] - a[1])[0]?.[0] || '—';

        if (session.role === 'hospital_nir') return <HospitalNirScreen session={session} onLogout={handleLogout} />;

        return (
          <div className="min-h-screen">
            <div className="mx-auto flex min-h-screen max-w-[1600px]">
              <aside className="hidden w-72 flex-col border-r border-slate-800/70 bg-slate-950/90 p-6 lg:flex">
                <div>
                  <div className="flex items-center gap-3">
                    <div className="flex h-12 w-12 items-center justify-center rounded-2xl bg-sky-500/15 text-lg font-semibold text-sky-300">+</div>
                    <div>
                      <p className="font-display text-xl font-semibold text-white">SIREME</p>
                      <p className="text-sm text-slate-500">Regulação assistida</p>
                    </div>
                  </div>
                  <div className="mt-8 space-y-2">
                    {NAV_ITEMS.map(([id, label]) => (
                      <button

                        onClick={() => setView(id)}

                        <span>{label}</span>
                        {view === id ? <span>•</span> : null}
                      </button>

                  </div>
                </div>

                  <p className="font-medium text-white">{session.name}</p>
                  <p className="text-sm text-slate-500">{session.role}</p>
                  <button onClick={handleLogout} className="mt-4 w-full rounded-2xl border border-slate-700 px-4 py-3 text-sm text-slate-300 hover:bg-slate-800">Sair</button>
                </div>
              </aside>

              <main className="flex-1 p-4 lg:p-8">
                <div className="mx-auto max-w-7xl space-y-6">
                  <div className="flex flex-wrap items-center justify-between gap-4 rounded-[2rem] border border-slate-800/70 bg-slate-950/70 px-6 py-5">
                    <div>
                      <p className="text-xs uppercase tracking-[0.18em] text-slate-500">SIREME</p>
                      <h1 className="mt-2 font-display text-3xl font-semibold text-white">
                        {view === 'dashboard' ? 'Dashboard' :
                         view === 'new-case' ? 'Novo Caso' :
                         view === 'recommendation' ? 'Recomendação' :
                         view === 'history' ? 'Histórico' :
                         view === 'hospitals' ? 'Painel Hospitalar' :
                         view === 'nir' ? 'Modo NIR / Leitos' : 'Modo Simulação'}
                      </h1>
                    </div>
                    <div className="flex flex-wrap gap-2 lg:hidden">
                      {NAV_ITEMS.map(([id, label]) => (
                        <button key={id} onClick={() => setView(id)} className={`rounded-full px-3 py-2 text-xs ${view === id ? 'bg-sky-500 text-slate-950' : 'bg-slate-900 text-slate-300'}`}>{label}</button>
                      ))}
                    </div>
                  </div>

                  {view === 'dashboard' && (
                    <div className="space-y-6">
                      <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
                        <StatCard label="Casos do dia" value={cases.filter((item) => new Date(item.savedAt).toDateString() === new Date().toDateString()).length} sub="registrados hoje" />
                        <StatCard label="Casos críticos" value={cases.filter((item) => item.recommendation.classification.gravity === 'critico').length} sub="histórico total" />
                        <StatCard label="Tempo médio" value={cases.length ? formatDuration(cases.reduce((sum, item) => sum + item.recommendation.timeToRecommendationMs, 0) / cases.length) : '—'} sub="até recomendação" />
                        <StatCard label="Top hospital" value={topHospital} sub="mais sugerido" />
                      </div>

                      <div className="grid gap-6 xl:grid-cols-[1.4fr_0.8fr]">
                        <Card>
                          <div className="flex items-center justify-between">
                            <div>
                              <p className="text-xs uppercase tracking-[0.18em] text-slate-500">Ações rápidas</p>
                              <h2 className="mt-2 font-display text-xl text-white">Operação de regulação</h2>
                            </div>
                          </div>
                          <div className="mt-5 grid gap-3 md:grid-cols-2 xl:grid-cols-5">
                            {[
                              ['new-case', 'Novo Caso'],
                              ['hospitals', 'Hospitais'],
                              ['history', 'Histórico'],
                              ['nir', 'NIR / Leitos'],
                              ['simulation', 'Simulação'],

                              <button key={id} onClick={() => setView(id)} className="rounded-2xl border border-slate-800 bg-slate-900/60 px-4 py-5 text-left hover:border-slate-700">
                                <div className="font-medium text-white">{label}</div>
                                <div className="mt-1 text-xs text-slate-500">Abrir painel</div>
                              </button>

                          </div>

                            <p className="text-xs uppercase tracking-[0.18em] text-slate-500">Casos recentes</p>

                                <div key={item.id} className="rounded-2xl border border-slate-800 bg-slate-900/40 px-4 py-4">

                                    <span className="font-mono text-xs text-slate-400">{item.id}</span>
                                    <Badge tone={item.recommendation.classification.gravity === 'critico' ? 'danger' : item.recommendation.classification.gravity === 'alto' ? 'warning' : 'info'}>
                                      {GRAVITY_LABELS[item.recommendation.classification.gravity]}

                                  <p className="mt-2 text-sm text-slate-300">{item.finalHospitalName}</p>
                                  <p className="text-xs text-slate-500">{item.regulatorName}</p>

                                  </div>
                                </div>

                            </div>
                          </Card>

                            <div className="mt-4 grid gap-3">

                              </div>
                            </div>
                          </Card>
                        </div>
                      </div>

                                <div>
                                  <label className="mb-2 block text-sm text-slate-400">REDS / Regulação</label>
                                  <input className="w-full rounded-2xl border border-slate-800 bg-slate-900/80 px-4 py-3 text-white" value={newCase.regulationCode} onChange={(e) => updateForm({ regulationCode: e.target.value })} />
                                </div>
                                <div>
                                  <label className="mb-2 block text-sm text-slate-400">Idade</label>
                                  <input type="number" className="w-full rounded-2xl border border-slate-800 bg-slate-900/80 px-4 py-3 text-white" value={newCase.age || ''} onChange={(e) => updateForm({ age: Number(e.target.value) })} />
                                </div>
                                <div>
                                  <label className="mb-2 block text-sm text-slate-400">Sexo</label>
                                  <select className="w-full rounded-2xl border border-slate-800 bg-slate-900/80 px-4 py-3 text-white" value={newCase.sex} onChange={(e) => updateForm({ sex: e.target.value })}>
                                    <option value="M">Masculino</option>
                                    <option value="F">Feminino</option>
                                  </select>
                                </div>
                                <div className="md:col-span-2">
                                  <label className="mb-2 block text-sm text-slate-400">Origem</label>
                                  <select
                                    className="w-full rounded-2xl border border-slate-800 bg-slate-900/80 px-4 py-3 text-white"
                                    value={newCase.origin}
                                    onChange={(e) => {
                                      const origin = CURITIBA_ORIGINS.find((item) => item.name === e.target.value);
                                      updateForm({ origin: e.target.value, originLat: origin?.lat || -25.4296, originLng: origin?.lng || -49.2719 });
                                    }}
                                  >
                                    <option value="">Selecione</option>
                                    {CURITIBA_ORIGINS.map((origin) => <option key={origin.name} value={origin.name}>{origin.name}</option>)}
                                  </select>
                                </div>
                                <div>
                                  <label className="mb-2 block text-sm text-slate-400">Transporte</label>
                                  <select className="w-full rounded-2xl border border-slate-800 bg-slate-900/80 px-4 py-3 text-white" value={newCase.transportType} onChange={(e) => updateForm({ transportType: e.target.value })}>
                                    <option>USB</option>
                                    <option>USA</option>
                                    <option>helicoptero</option>
                                    <option>particular</option>
                                  </select>
                                </div>
                                <div>
                                  <label className="mb-2 block text-sm text-slate-400">Tipo de caso</label>
                                  <select className="w-full rounded-2xl border border-slate-800 bg-slate-900/80 px-4 py-3 text-white" value={newCase.caseType} onChange={(e) => updateForm({ caseType: e.target.value })}>
                                    <option value="pre_hospitalar">Pré-hospitalar</option>
                                    <option value="transferencia">Transferência</option>
                                    <option value="vaga_especializada">Vaga especializada</option>
                                    <option value="avaliacao_inicial">Avaliação inicial</option>
                                  </select>
                                </div>
                              </div>
                            </>
                          )}

                          {step === 2 && (
                            <>
                              <div>
                                <label className="mb-2 block text-sm text-slate-400">Queixa principal</label>
                                <textarea className="min-h-[110px] w-full rounded-2xl border border-slate-800 bg-slate-900/80 px-4 py-3 text-white" value={newCase.chiefComplaint} onChange={(e) => updateForm({ chiefComplaint: e.target.value })}></textarea>
                              </div>
                              <div>
                                <label className="mb-2 block text-sm text-slate-400">Suspeita clínica</label>
                                <textarea className="min-h-[110px] w-full rounded-2xl border border-slate-800 bg-slate-900/80 px-4 py-3 text-white" value={newCase.clinicalSuspicion} onChange={(e) => updateForm({ clinicalSuspicion: e.target.value })}></textarea>
                              </div>
                              <div className="grid gap-4 md:grid-cols-4">
                                {[
                                  ['pressuraSistolica', 'PA sistólica'],
                                  ['frequenciaCardiaca', 'FC'],
                                  ['saturacaoO2', 'SpO₂'],
                                  ['glasgow', 'Glasgow'],
                                ].map(([key, label]) => (
                                  <div key={key}>
                                    <label className="mb-2 block text-sm text-slate-400">{label}</label>
                                    <input type="number" className="w-full rounded-2xl border border-slate-800 bg-slate-900/80 px-4 py-3 text-white" value={newCase.vitalSigns[key] || ''} onChange={(e) => updateForm({ vitalSigns: { ...newCase.vitalSigns, [key]: Number(e.target.value) || undefined } })} />
                                  </div>
                                ))}
                              </div>
                              <div>
                                <label className="mb-2 block text-sm text-slate-400">Nível de consciência</label>
                                <select className="w-full rounded-2xl border border-slate-800 bg-slate-900/80 px-4 py-3 text-white" value={newCase.consciousnessLevel} onChange={(e) => updateForm({ consciousnessLevel: e.target.value })}>
                                  <option value="alerta">Alerta</option>
                                  <option value="confuso">Confuso</option>
                                  <option value="soporoso">Soporoso</option>
                                  <option value="inconsciente">Inconsciente</option>
                                </select>
                              </div>
                              <div>
                                <label className="mb-2 block text-sm text-slate-400">Mini triagem guiada</label>
                                <div className="flex flex-wrap gap-2">
                                  {TRIAGE_OPTIONS.map(([value, label]) => (
                                    <button key={value} onClick={() => toggleListValue('triageTags', value)} type="button" className={`rounded-full border px-3 py-2 text-sm ${newCase.triageTags.includes(value) ? 'border-sky-500/40 bg-sky-500/10 text-sky-300' : 'border-slate-800 bg-slate-900/40 text-slate-400'}`}>
                                      {label}
                                    </button>
                                  ))}
                                </div>
                              </div>
                              {newCase.triageTags.filter((tag) => PROTOCOL_CHECKLISTS[tag]).length > 0 && (
                                <div className="space-y-3">
                                  {newCase.triageTags.filter((tag) => PROTOCOL_CHECKLISTS[tag]).map((tag) => {
                                    const list = PROTOCOL_CHECKLISTS[tag];
                                    const c = TIMER_COLORS[list.color] || TIMER_COLORS.rose;
                                    return (
                                      <div key={tag} className={`rounded-2xl border ${c.border} ${c.bg} p-4`}>
                                        <p className={`text-xs font-semibold uppercase tracking-wider mb-3 ${c.text}`}>{list.title}</p>
                                        <div className="space-y-2">
                                          {list.items.map((item, i) => (
                                            <div key={i} className="flex items-start gap-2">
                                              <span className="text-slate-600 text-xs mt-0.5 flex-shrink-0">□</span>
                                              <p className="text-sm text-slate-300">{item}</p>
                                            </div>
                                          ))}
                                        </div>
                                      </div>
                                    );
                                  })}
                                </div>
                              )}
                            </>

                            <>
                              <div>
                                <label className="mb-2 block text-sm text-slate-400">Recursos obrigatórios</label>

                                  {Object.keys(RESOURCE_LABELS).map((resource) => (
                                    <button key={resource} type="button" onClick={() => toggleListValue('requiredResources', resource)} className={`rounded-full border px-3 py-2 text-sm ${newCase.requiredResources.includes(resource) ? 'border-red-500/40 bg-red-500/10 text-red-300' : 'border-slate-800 bg-slate-900/40 text-slate-400'}`}>
                                      {RESOURCE_LABELS[resource]}
                                    </button>
                                  ))}
                                </div>
                              </div>
                              <div>
                                <label className="mb-2 block text-sm text-slate-400">Recursos desejáveis</label>
                                <div className="flex flex-wrap gap-2">
                                  {Object.keys(RESOURCE_LABELS).map((resource) => (
                                    <button key={resource} type="button" onClick={() => toggleListValue('desiredResources', resource)} className={`rounded-full border px-3 py-2 text-sm ${newCase.desiredResources.includes(resource) ? 'border-sky-500/40 bg-sky-500/10 text-sky-300' : 'border-slate-800 bg-slate-900/40 text-slate-400'}`}>
                                      {RESOURCE_LABELS[resource]}
                                    </button>
                                  ))}
                                </div>
                              </div>

                                <label className="mb-2 block text-sm text-slate-400">Observações livres</label>

                            <div className="space-y-4">

                                        <Badge tone="success">{CARE_LINE_LABELS[preview.careLine]}</Badge>
                                      </div>
                                      <p className="mt-4 text-sm text-slate-300">Pré-classificação pronta para gerar recomendação hospitalar.</p>
                                    </Card>
                                  </>
                                );
                              })()}

                            </div>

                            <Badge tone="info">{CATEGORY_LABELS[item.recommendation.classification.category]}</Badge>

                            <div className="space-y-3">
                              {item.timeline.map((entry, index) => (
                                <div key={index} className="rounded-2xl border border-slate-800 bg-slate-900/40 px-4 py-3 text-sm">
                                  <p className="font-medium text-white">{entry.label}</p>
                                  <p className="text-xs text-slate-500">{entry.detail}</p>
                                </div>
                              ))}
                            </div>
                          </div>
                        </Card>
                      )) : <Card className="text-center text-slate-500">Nenhum caso salvo ainda.</Card>}
                    </div>
                  )}

                  {view === 'hospitals' && (
                    <HospitalNetworkView hospitals={liveHospitals} />
                  )}

                  {view === 'simulation' && (
                    <div className="grid gap-4 lg:grid-cols-2">
                      {SIMULATION_CASES.map((simulation) => (
                        <Card key={simulation.id}>
                          <div className="flex items-start gap-4">
                            <div className="text-3xl">{simulation.icon}</div>
                            <div>
                              <h3 className="font-display text-xl text-white">{simulation.title}</h3>
                              <p className="text-sm text-slate-500">{simulation.subtitle}</p>
                              <div className="mt-3 flex gap-2">
                                <Badge tone="info">{simulation.expectedCategory}</Badge>
                                <Badge tone={simulation.expectedGravity === 'Crítico' ? 'danger' : 'warning'}>{simulation.expectedGravity}</Badge>
                              </div>
                            </div>
                          </div>
                          <button
                            onClick={() => {
                              setNewCase({ ...simulation.data });
                              generateRecommendation({ ...simulation.data });
                            }}
                            className="mt-5 w-full rounded-2xl bg-sky-500 px-4 py-3 font-semibold text-slate-950"
                          >
                            Rodar simulação
                          </button>
                        </Card>
                      ))}
                    </div>
                  )}

                  {view === 'nir' && (
                    <NirView hospitals={liveHospitals} />
                  )}
                </div>
              </main>
            </div>
          </div>
        );
      }

      function RecommendationView({ result, onBack, onSave, session, caseStartedAt }) {
        const [decisionMode, setDecisionMode] = useState('confirm');
        const [selectedHospitalId, setSelectedHospitalId] = useState(result.alternatives[0]?.hospital.id || result.recommended.hospital.id);
        const [overrideReason, setOverrideReason] = useState('');
        const [notified, setNotified] = useState(false);
        const mapHospitals = [result.recommended.hospital, ...result.alternatives.map((item) => item.hospital)];

        function handleNotify() {
          sendNotification({
            hospitalId: result.recommended.hospital.id,
            sentBy: session?.name || 'Regulação',
            caseId: result.caseId,
            category: result.classification.category,
            gravity: result.classification.gravity,
            estimatedArrivalMin: result.recommended.estimatedTimeMin,
            patientAge: result.caseData.age,
            patientSex: result.caseData.sex,
            resources: result.classification.requiredResources,
            chiefComplaint: result.caseData.chiefComplaint,
          });
          setNotified(true);
        }

        return (
          <div className="space-y-6">
            {PROTOCOL_WINDOWS[result.classification.category] && (
              <TherapeuticTimer category={result.classification.category} startedAt={caseStartedAt || Date.now()} />
            )}
            <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-5">
              <StatCard label="Categoria" value={CATEGORY_LABELS[result.classification.category]} sub={CARE_LINE_LABELS[result.classification.careLine]} />
              <StatCard label="Gravidade" value={GRAVITY_LABELS[result.classification.gravity]} sub={`${result.classification.alerts.length} alertas`} />
              <StatCard label="Recursos" value={result.classification.requiredResources.length} sub="obrigatórios" />
              <StatCard label="Confiança" value={`${result.recommended.confidence}%`} sub="recomendação" />
              <StatCard label="Tempo" value={`~${result.recommended.estimatedTimeMin} min`} sub="deslocamento estimado" />
            </div>

            <div className="grid gap-6 xl:grid-cols-[1.1fr_0.9fr]">
              <Card>
                <div className="flex flex-wrap items-center gap-2">
                  <Badge tone={result.classification.gravity === 'critico' ? 'danger' : result.classification.gravity === 'alto' ? 'warning' : 'info'}>
                    {GRAVITY_LABELS[result.classification.gravity]}
                  </Badge>
                  <Badge tone="info">{CATEGORY_LABELS[result.classification.category]}</Badge>
                  <Badge tone="success">{CARE_LINE_LABELS[result.classification.careLine]}</Badge>
                </div>
                <h2 className="mt-4 font-display text-3xl font-semibold text-white">{result.recommended.hospital.name}</h2>
                <p className="mt-2 text-slate-400">{result.recommended.hospital.neighborhood} · score final {result.recommended.finalScore}</p>
                <div className="mt-6 grid gap-3 md:grid-cols-2">
                  <div className="rounded-2xl border border-slate-800 bg-slate-900/50 px-4 py-4">
                    <p className="text-xs uppercase tracking-[0.18em] text-slate-500">Justificativa</p>
                    <div className="mt-3 space-y-2 text-sm text-slate-300">
                      {result.recommended.justification.map((item, index) => <p key={index}>• {item}</p>)}
                    </div>
                  </div>
                  <div className="rounded-2xl border border-slate-800 bg-slate-900/50 px-4 py-4">
                    <p className="text-xs uppercase tracking-[0.18em] text-slate-500">Recursos necessários</p>
                    <div className="mt-3 flex flex-wrap gap-2">
                      {result.classification.requiredResources.map((item) => <Badge key={item} tone="danger">{RESOURCE_LABELS[item]}</Badge>)}
                      {result.classification.desiredResources.map((item) => <Badge key={item} tone="info">{RESOURCE_LABELS[item]}</Badge>)}
                    </div>
                  </div>
                </div>

                <div className="mt-6">
                  <p className="text-xs uppercase tracking-[0.18em] text-slate-500">Alternativas secundárias</p>
                  <div className="mt-3 space-y-3">
                    {result.alternatives.map((item) => (
                      <div key={item.hospital.id} className="rounded-2xl border border-slate-800 bg-slate-900/50 px-4 py-4">
                        <div className="flex items-center justify-between gap-3">
                          <div>
                            <p className="font-medium text-white">{item.hospital.shortName}</p>
                            <p className="text-xs text-slate-500">{item.distanceKm} km · {item.snapshot.occupancyPercent}% lotação</p>
                          </div>
                          <Badge tone="default">{item.finalScore} pts</Badge>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="mt-6">
                  <p className="text-xs uppercase tracking-[0.18em] text-slate-500">Hospitais excluídos</p>
                  <div className="mt-3 space-y-3">
                    {result.excluded.slice(0, 6).map((item) => (
                      <div key={item.hospital.id} className="rounded-2xl border border-slate-800 bg-slate-900/50 px-4 py-4">
                        <p className="font-medium text-white">{item.hospital.shortName}</p>
                        <div className="mt-2 space-y-1 text-xs text-slate-500">
                          {item.reasons.map((reason, index) => <p key={index}>• {reason}</p>)}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </Card>

              <div className="space-y-6">
                <Card>
                  <HospitalMap
                    hospitals={mapHospitals}
                    origin={{ lat: result.caseData.originLat, lng: result.caseData.originLng }}
                    selectedId={result.recommended.hospital.id}
                    height={320}
                  />
                </Card>

                <Card>
                  <p className="text-xs uppercase tracking-[0.18em] text-slate-500">Decisão do regulador</p>
                  <div className="mt-4 flex gap-2">
                    <button onClick={() => setDecisionMode('confirm')} className={`rounded-2xl px-4 py-3 text-sm ${decisionMode === 'confirm' ? 'bg-sky-500 text-slate-950' : 'bg-slate-900 text-slate-300'}`}>Confirmar</button>
                    <button onClick={() => setDecisionMode('override')} className={`rounded-2xl px-4 py-3 text-sm ${decisionMode === 'override' ? 'bg-amber-500 text-slate-950' : 'bg-slate-900 text-slate-300'}`}>Override</button>
                  </div>
                  {decisionMode === 'override' ? (
                    <div className="mt-4 space-y-4">
                      <select className="w-full rounded-2xl border border-slate-800 bg-slate-900/80 px-4 py-3 text-white" value={selectedHospitalId} onChange={(e) => setSelectedHospitalId(e.target.value)}>
                        {HOSPITALS.filter((item) => item.id !== result.recommended.hospital.id).map((item) => <option key={item.id} value={item.id}>{item.name}</option>)}
                      </select>
                      <textarea className="min-h-[120px] w-full rounded-2xl border border-slate-800 bg-slate-900/80 px-4 py-3 text-white" placeholder="Motivo da divergência" value={overrideReason} onChange={(e) => setOverrideReason(e.target.value)}></textarea>
                    </div>
                  ) : null}
                  <button
                    onClick={handleNotify}
                    disabled={notified}
                    className={`mt-4 w-full rounded-2xl px-4 py-3 text-sm font-semibold transition border ${notified ? 'border-emerald-500/40 bg-emerald-500/10 text-emerald-300 cursor-default' : 'border-slate-700 bg-slate-800/60 hover:bg-slate-700 text-white'}`}
                  >
                    {notified ? `✓ ${result.recommended.hospital.shortName} notificado` : `Pré-notificar ${result.recommended.hospital.shortName}`}
                  </button>
                  <div className="mt-3 flex gap-3">
                    <button onClick={onBack} className="flex-1 rounded-2xl border border-slate-800 px-4 py-3 text-sm text-slate-300">Editar caso</button>
                    <button onClick={() => onSave(decisionMode === 'override' ? selectedHospitalId : result.recommended.hospital.id, overrideReason)} className="flex-1 rounded-2xl bg-sky-500 px-4 py-3 text-sm font-semibold text-slate-950">Salvar caso</button>
                  </div>
                </Card>
              </div>
            </div>
          </div>
        );
      }

      function HospitalNetworkView({ hospitals }) {
        const [filter, setFilter] = useState('all');
        const [selectedId, setSelectedId] = useState(hospitals[0]?.id);
        const filtered = filter === 'all' ? hospitals : hospitals.filter((item) => item.type === filter);
        return (
          <div className="space-y-6">
            <Card>
              <div className="flex flex-wrap gap-2">
                {['all', 'hospital', 'upa'].map((filterKey) => (
                  <button key={filterKey} onClick={() => setFilter(filterKey)} className={`rounded-full px-4 py-2 text-sm ${filter === filterKey ? 'bg-sky-500 text-slate-950' : 'bg-slate-900 text-slate-300'}`}>
                    {filterKey === 'all' ? 'Todos' : filterKey === 'hospital' ? 'Hospitais' : 'UPAs'}
                  </button>
                ))}
              </div>
              <div className="mt-5">
                <HospitalMap hospitals={filtered} selectedId={selectedId} onSelect={setSelectedId} height={380} />
              </div>
            </Card>

            <div className="grid gap-4 xl:grid-cols-2">
              {filtered.map((item) => (
                <Card key={item.id}>
                  <div className="flex items-start justify-between gap-3">
                    <div>
                      <div className="flex flex-wrap gap-2">
                        <Badge tone={item.type === 'upa' ? 'warning' : 'info'}>{item.type === 'upa' ? 'UPA' : 'Hospital'}</Badge>
                        <Badge tone="default">CNES {item.cnes}</Badge>
                      </div>
                      <h3 className="mt-4 font-display text-2xl text-white">{item.name}</h3>
                      <p className="text-sm text-slate-500">{item.address}</p>
                    </div>
                    <Badge tone={item.snapshot.occupancy === 'critica' ? 'danger' : item.snapshot.occupancy === 'alta' ? 'warning' : 'success'}>
                      {item.snapshot.occupancyPercent}%
                    </Badge>
                  </div>
                  <div className="mt-4 grid gap-3 md:grid-cols-3">
                    <StatCard label="Leitos" value={item.totalBeds} sub="totais" />
                    <StatCard label="UTI" value={item.icuBeds || '—'} sub="leitos" />
                    <StatCard label="Fila" value={item.snapshot.emergencyQueue} sub={item.snapshot.statusLabel} />
                  </div>
                  <div className="mt-4 flex flex-wrap gap-2">
                    {item.offers.map((offer) => <Badge key={offer} tone="info">{offer}</Badge>)}
                  </div>
                  <p className="mt-4 text-sm text-slate-400">{item.regulationNotes}</p>
                </Card>
              ))}
            </div>
          </div>
        );
      }

      function NirView({ hospitals }) {
        const panel = hospitals.filter((item) => item.type === 'hospital').map((item) => ({
          ...item,
          adultIcu: item.resources.includes('UTI_ADULTO') ? Math.max(0, Math.round(item.icuBeds * (100 - item.snapshot.occupancyPercent) / 100)) : 0,
          pedIcu: item.resources.includes('UTI_PEDIATRICA') ? Math.max(0, Math.round(item.icuBeds * 0.35 * (100 - item.snapshot.occupancyPercent) / 100)) : 0,
          neoIcu: item.resources.includes('UTI_NEONATAL') ? Math.max(0, Math.round(item.icuBeds * 0.45 * (100 - item.snapshot.occupancyPercent) / 100)) : 0,
          monitored: Math.max(1, Math.round(item.totalBeds * 0.1 * (100 - item.snapshot.occupancyPercent) / 100)),
        })).sort((a, b) => (b.adultIcu + b.pedIcu + b.neoIcu) - (a.adultIcu + a.pedIcu + a.neoIcu));

        return (
          <div className="space-y-6">
            <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-5">
              <StatCard label="UTI Adulto" value={panel.reduce((sum, item) => sum + item.adultIcu, 0)} sub="estimados livres" />
              <StatCard label="UTI Pediátrica" value={panel.reduce((sum, item) => sum + item.pedIcu, 0)} sub="estimados livres" />
              <StatCard label="UTI Neonatal" value={panel.reduce((sum, item) => sum + item.neoIcu, 0)} sub="estimados livres" />
              <StatCard label="Fila regulada" value={NIR_REQUESTS.length} sub="solicitações ativas" />
              <StatCard label="Pressão da rede" value={panel.filter((item) => ['alta', 'critica'].includes(item.snapshot.occupancy)).length} sub="unidades tensionadas" />
            </div>

            <div className="grid gap-6 xl:grid-cols-[1.2fr_0.8fr]">
              <div className="space-y-4">
                {panel.map((item) => (
                  <Card key={item.id}>
                    <div className="flex items-start justify-between gap-3">
                      <div>
                        <p className="font-display text-2xl text-white">{item.shortName}</p>
                        <p className="text-sm text-slate-500">{item.neighborhood} · {item.snapshot.statusLabel}</p>
                      </div>
                      <Badge tone={item.snapshot.occupancy === 'critica' ? 'danger' : item.snapshot.occupancy === 'alta' ? 'warning' : 'success'}>
                        {item.snapshot.occupancyPercent}%
                      </Badge>
                    </div>
                    <div className="mt-5 grid gap-3 md:grid-cols-4">
                      <StatCard label="UTI adulto" value={item.adultIcu} sub="estimados" />
                      <StatCard label="UTI pediátrica" value={item.pedIcu} sub="estimados" />
                      <StatCard label="UTI neo" value={item.neoIcu} sub="estimados" />
                      <StatCard label="Monitorizados" value={item.monitored} sub="estimados" />
                    </div>
                  </Card>
                ))}
              </div>

              <div className="space-y-4">
                {NIR_REQUESTS.map((request) => (
                  <Card key={request.id}>
                    <div className="flex items-center justify-between gap-3">
                      <p className="font-display text-xl text-white">{request.patientCode}</p>
                      <Badge tone={request.priority === 'Crítica' ? 'danger' : 'warning'}>{request.priority}</Badge>
                    </div>
                    <p className="mt-2 text-sm text-slate-400">{request.originUnit}</p>
                    <p className="mt-2 text-sm text-slate-300">{RESOURCE_LABELS[request.resource]}</p>
                    <p className="mt-2 text-xs text-slate-500">{request.status}</p>
                    <p className="mt-3 text-sm text-slate-400">{request.notes}</p>
                  </Card>
                ))}
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
